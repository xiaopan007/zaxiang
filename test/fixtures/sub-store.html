<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Sub Store</title>
  <meta name="version" content="2.17.49">
  <meta name="description" content="A sub-converter running in a Progressive Web App">
</head>
<body>
  <div id="app">
    <div class="nut-navbar">
      <button class="navBar-left-icon--refresh"><svg data-icon="arrow-rotate-right"></svg></button>
      <button class="navBar-left-icon--add"><svg data-icon="plus"></svg></button>
      <span>订阅管理</span>
      <button><svg data-icon="search"></svg></button>
    </div>
    <div class="page-container">
      <input type="search">
      <div class="radio-wrapper"><span class="tag current">全部</span><span class="tag">本地订阅</span></div>
      <div class="nut-cell nut-form-item"><div class="nut-form-item__label">图标原色</div><view class="nut-switch switch-open nut-switch-base"></view></div>
      <view class="nut-checkbox nut-checkbox--round"><view class="nut-checkbox__label">示例订阅</view></view>
      <div class="nut-cell nut-form-item"><div class="nut-form-item__label">密钥类型</div><view class="nut-radiogroup"><view class="nut-radio nut-radio--button"><view class="nut-radio__button nut-radio__button--active">X25519</view></view></view></div>
      <view class="nut-cell include-subs-trigger">手动选择的订阅</view>
      <div class="common-title-row"><div class="title">常用配置</div></div>
      <div class="sub-list">
        <div class="sub-item-wrapper">
          <div class="sub-item-content">
            <div class="sub-item-title-wrapper"><h3 class="sub-item-title">示例订阅</h3><div class="sub-item-menu">
              <button class="compare-sub-link"><svg data-icon="ellipsis"></svg></button>
              <button class="refresh-sub-flow"><svg data-icon="pen-nib"></svg></button>
              <button class="copy-sub-link"><svg data-icon="angles-right"></svg></button>
            </div></div>
            <p class="sub-item-detail-isSimple">本地订阅</p>
          </div>
        </div>
        <view class="nut-swipe__right"><div class="sub-item-swipe-btn-wrapper"><view class="nut-button"><svg data-icon="paste"></svg></view></div><div class="sub-item-swipe-btn-wrapper"><a href="/redacted-export"><view class="nut-button"><svg data-icon="file-export"></svg></view></a></div><div class="sub-item-swipe-btn-wrapper"><view class="nut-button"><svg data-icon="trash-can"></svg></view></div></view>
      </div>
      <view class="nut-button upload-all-btn"><svg data-icon="cloud-arrow-up"></svg></view>
      <view class="nut-button upload-all-btn"><svg data-icon="cloud-arrow-down"></svg></view>
      <view class="nut-button preview-btn"><svg data-icon="eye"></svg></view>
      <view class="nut-button compare-btn"><svg data-icon="eye"></svg><span>即时预览</span></view>
      <view class="nut-button submit-btn"><svg data-icon="floppy-disk"></svg><span>保存</span></view>
    </div>
    <div class="menu-items"><div class="menu-item active"><i class="nut-icon-link"></i><span>订阅</span></div><div class="menu-item"><i class="nut-icon-category"></i><span>文件</span></div><div class="menu-item"><i class="nut-icon-refresh2"></i><span>同步</span></div><div class="menu-item"><svg data-icon="share-nodes"></svg><span>分享</span></div><div class="menu-item"><svg data-icon="box-archive"></svg><span>归档</span></div><div class="menu-item"><i class="nut-icon-setting"></i><span>我的</span></div></div>
  </div>
  <script src="../../sub-store.user.js" charset="UTF-8"></script>
</body>
</html>
