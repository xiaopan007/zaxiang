name: Build we-mp-rss

on:
  workflow_dispatch:
  schedule:
    - cron: "23 20 * * *"

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_REPO: https://github.com/rachelos/we-mp-rss.git
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/we-mp-rss

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Clone upstream source
        run: |
          git clone --depth 1 "$UPSTREAM_REPO" upstream

      - name: Apply QR code patch if needed
        run: |
          bash we-mp-rss-ghcr/scripts/apply-qrcode-patch-if-needed.sh upstream "$GITHUB_WORKSPACE/we-mp-rss-ghcr/patches/wx-qrcode.patch"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: upstream
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
