name: Build we-mp-rss

on:
  workflow_dispatch:
  schedule:
    - cron: "23 20 * * *"

permissions:
  contents: read
  packages: write

env:
  OFFICIAL_IMAGE: ghcr.io/rachelos/we-mp-rss:latest
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/we-mp-rss

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve official image digest
        id: official
        run: |
          digest="$(docker buildx imagetools inspect "$OFFICIAL_IMAGE" | awk '/Digest:/ {print $2; exit}')"
          if [[ -z "$digest" ]]; then
            echo "ERROR: failed to resolve official image digest" >&2
            exit 1
          fi
          echo "image=$OFFICIAL_IMAGE@$digest" >> "$GITHUB_OUTPUT"
          echo "Using official image: $OFFICIAL_IMAGE@$digest"

      - name: Extract wx.py from official image
        run: |
          mkdir -p patched-context/driver
          docker pull "${{ steps.official.outputs.image }}"
          container_id="$(docker create "${{ steps.official.outputs.image }}")"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          docker cp "$container_id:/app/driver/wx.py" patched-context/driver/wx.py
          docker rm "$container_id"

      - name: Apply QR code patch if needed
        run: |
          bash we-mp-rss-ghcr/scripts/apply-qrcode-patch-if-needed.sh patched-context "$GITHUB_WORKSPACE/we-mp-rss-ghcr/patches/wx-qrcode.patch"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: patched-context
          file: we-mp-rss-ghcr/Dockerfile.overlay
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ steps.official.outputs.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
